<svg width="600" height="120" viewBox="0 0 600 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Highly Detailed Pure White Camera Lens Icon -->
  <g transform="translate(10, 10)">
    <!-- Lens Barrel (Outer Housing) -->
    <circle cx="50" cy="50" r="48" stroke="white" stroke-width="2"/>
    <circle cx="50" cy="50" r="44" stroke="white" stroke-width="1" opacity="0.5"/>
    
    <!-- Focus/Aperture Ring Details -->
    <path d="M50 2 A 48 48 0 0 1 98 50" stroke="white" stroke-width="4" opacity="0.2"/>
    <g>
      <rect x="49" y="2" width="2" height="8" fill="white" rx="1"/>
      <rect x="90" y="49" width="8" height="2" fill="white" rx="1"/>
      <rect x="49" y="90" width="2" height="8" fill="white" rx="1"/>
      <rect x="2" y="49" width="8" height="2" fill="white" rx="1"/>
    </g>
    
    <!-- Inner Lens Elements & Coatings -->
    <circle cx="50" cy="50" r="38" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <circle cx="50" cy="50" r="32" fill="white" fill-opacity="0.1"/>
    
    <!-- Aperture Blades (Realistic Interlocking Style) -->
    <g transform="translate(50, 50)">
      <path d="M0 -30 L26 -15 L26 15 L0 30 L-26 15 L-26 -15 Z" fill="white" fill-opacity="0.15" stroke="white" stroke-width="1.5"/>
      <path d="M0 -30 L10 -5 L26 -15" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <path d="M26 -15 L15 10 L26 15" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <path d="M26 15 L-5 20 L0 30" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <path d="M0 30 L-20 5 L-26 15" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <path d="M-26 15 L-15 -15 L-26 -15" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <path d="M-26 -15 L5 -15 L0 -30" stroke="white" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- Center Optics -->
    <circle cx="50" cy="50" r="14" stroke="white" stroke-width="2" fill="white" fill-opacity="0.2"/>
    <circle cx="50" cy="50" r="8" fill="white"/>
    
    <!-- Professional Lens Glints -->
    <path d="M75 25 C85 35 85 65 75 75" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <circle cx="68" cy="32" r="4" fill="white" opacity="0.8"/>
    <circle cx="32" cy="68" r="2" fill="white" opacity="0.6"/>
  </g>
  
  <!-- "RABINSON" - High-end Serif -->
  <text x="130" y="62" fill="white" font-family="'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="52" letter-spacing="0.08em">RABINSON</text>
  
  <!-- "PHOTOGRAPHY" - Modern Wide Sans-serif -->
  <text x="132" y="98" fill="white" font-family="Montserrat, Inter, sans-serif" font-weight="500" font-size="18" letter-spacing="0.7em">PHOTOGRAPHY</text>
</svg>
