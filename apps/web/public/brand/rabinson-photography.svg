<svg width="600" height="120" viewBox="0 0 600 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Professional Camera Lens Icon -->
  <g transform="translate(10, 10)">
    <!-- Lens Barrel (Outer Housing) -->
    <circle cx="50" cy="50" r="48" stroke="black" stroke-width="1.5" opacity="0.9"/>
    <circle cx="50" cy="50" r="44" stroke="black" stroke-width="0.75" opacity="0.3"/>
    
    <!-- Focus/Aperture Ring Details -->
    <path d="M50 2 A 48 48 0 0 1 98 50" stroke="black" stroke-width="3" opacity="0.1"/>
    <g opacity="0.4">
      <rect x="49" y="2" width="2" height="6" fill="black" rx="1"/>
      <rect x="92" y="49" width="6" height="2" fill="black" rx="1"/>
      <rect x="49" y="92" width="2" height="6" fill="black" rx="1"/>
      <rect x="2" y="49" width="6" height="2" fill="black" rx="1"/>
    </g>
    
    <!-- Inner Lens Elements & Coatings -->
    <circle cx="50" cy="50" r="38" stroke="black" stroke-width="1" opacity="0.2"/>
    <circle cx="50" cy="50" r="32" fill="black" fill-opacity="0.03"/>
    
    <!-- Aperture Blades (Realistic Interlocking Style) -->
    <g transform="translate(50, 50)" opacity="0.8">
      <path d="M0 -30 L26 -15 L26 15 L0 30 L-26 15 L-26 -15 Z" fill="black" fill-opacity="0.05" stroke="black" stroke-width="1"/>
      <path d="M0 -30 L10 -5 L26 -15" stroke="black" stroke-width="1" opacity="0.5"/>
      <path d="M26 -15 L15 10 L26 15" stroke="black" stroke-width="1" opacity="0.5"/>
      <path d="M26 15 L-5 20 L0 30" stroke="black" stroke-width="1" opacity="0.5"/>
      <path d="M0 30 L-20 5 L-26 15" stroke="black" stroke-width="1" opacity="0.5"/>
      <path d="M-26 15 L-15 -15 L-26 -15" stroke="black" stroke-width="1" opacity="0.5"/>
      <path d="M-26 -15 L5 -15 L0 -30" stroke="black" stroke-width="1" opacity="0.5"/>
    </g>
    
    <!-- Center Optics -->
    <circle cx="50" cy="50" r="14" stroke="black" stroke-width="1.5" fill="black" fill-opacity="0.1"/>
    <circle cx="50" cy="50" r="8" fill="black" fill-opacity="0.9"/>
    
    <!-- Professional Lens Glints -->
    <path d="M75 25 C85 35 85 65 75 75" stroke="black" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <circle cx="68" cy="32" r="3" fill="black" opacity="0.6"/>
    <circle cx="32" cy="68" r="1.5" fill="black" opacity="0.4"/>
  </g>
  
  <!-- "RABINSON" - High-end Serif -->
  <text x="130" y="62" fill="black" font-family="'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="52" letter-spacing="0.08em">RABINSON</text>
  
  <!-- "PHOTOGRAPHY" - Modern Wide Sans-serif -->
  <text x="132" y="98" fill="black" fill-opacity="0.8" font-family="Montserrat, Inter, sans-serif" font-weight="500" font-size="18" letter-spacing="0.7em">PHOTOGRAPHY</text>
</svg>
